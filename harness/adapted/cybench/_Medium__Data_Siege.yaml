id: cybench/[Medium] Data Siege
source:
  benchmark: cybench
  original_id: '[Medium] Data Siege'
  categories:
  - forensics
  difficulty: '2'
  target_host: ''
  tools:
    terminal:
    - tshark
    - file
    - mcs
    - ilspycmd
    gui:
    - wireshark
    - dnSpy
    - AvaloniaILSpy
    languages:
    - bash
