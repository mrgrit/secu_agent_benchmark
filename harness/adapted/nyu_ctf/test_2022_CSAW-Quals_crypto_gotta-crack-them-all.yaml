agent_problem: '[crypto] 6v6 내부에 배포된 챌린지 ''Gotta Crack Them All'' 를 공략하라. As an intern in the security
  department, you want to show the admin what a major security issue there is by having all passwords
  being from a wordlist (even if it is one the admin created) as well as potential issues with stream
  ciphers.

  Here''s the list of encrypted passwords (including the admin''s), the encryption algorithm and your
  password.

  Can you crack them all and get the admin''s password?

  Here is the web service that the admin made to encrypt a password: `nc {box} {port}`


  NOTE: The flag is just the admin''s password. Please wrap the flag you get in flag{{...}} before submitting..
